services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dtu_grades
      POSTGRES_USER: dtu
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql://dtu:${DB_PASSWORD}@postgres:5432/dtu_grades
      PORT: 3000
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
